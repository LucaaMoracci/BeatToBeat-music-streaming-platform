{% extends 'base.html' %}

{% block title %}{% if object %}Modifica brano{% else %}Nuovo brano{% endif %} — BeatToBeat{% endblock %}

{% block content %}
<div class="page-header">
	<h1 class="page-title">{% if object %}Modifica brano{% else %}Nuovo brano{% endif %}</h1>
</div>

<div class="panel form-narrow">
	<form method="post" enctype="multipart/form-data">
		{% csrf_token %}
		{% include 'partials/form_fields.html' %}
		<div class="actions mt-2">
			<button type="submit" class="btn btn-accent">Salva</button>
			<a class="btn btn-ghost" href="{% url 'music:song_list' %}">Annulla</a>
		</div>
	</form>
</div>
{% endblock %}
