<div class="music-card">
	<a href="{% url 'music:song_detail' song.pk %}">
		<div class="cover-art">
			{{ song.title|first|upper }}
			<div class="equalizer"><span></span><span></span><span></span></div>
		</div>
	</a>
	<a href="{% url 'music:song_detail' song.pk %}" class="card-title-music">{{ song.title }}</a>
	<div class="card-artist">{{ song.artist }}</div>
	<span class="genre-chip">{{ song.genre.name }}</span>
	{% if song.audio_file %}<span class="genre-chip">♪ Audio</span>{% endif %}
	<div class="mt-2">{% include 'partials/like_button.html' %}</div>
	<div class="card-actions">
		<a class="btn btn-ghost btn-sm" href="{% url 'music:song_detail' song.pk %}">Apri</a>
		{% if user.is_curator %}
		<a class="btn btn-ghost btn-sm" href="{% url 'music:song_update' song.pk %}">Modifica</a>
		<a class="btn btn-danger btn-sm" href="{% url 'music:song_delete' song.pk %}">Elimina</a>
		{% endif %}
	</div>
</div>
