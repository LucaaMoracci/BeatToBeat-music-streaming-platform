{% extends 'base.html' %}

{% block title %}Modifica profilo — BeatToBeat{% endblock %}

{% block content %}
<div class="page-header">
	<h1 class="page-title">Modifica profilo</h1>
</div>

<div class="panel form-narrow">
	<form method="post">
		{% csrf_token %}
		{% include 'partials/form_fields.html' %}
		<div class="actions mt-2">
			<button type="submit" class="btn btn-accent">Salva</button>
			<a class="btn btn-ghost" href="{% url 'accounts:profile' %}">Annulla</a>
		</div>
	</form>
</div>
{% endblock %}
